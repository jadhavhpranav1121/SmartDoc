# ?? Server ??????????????????????????????????????????????????????????????????
server.port=8080

# ?? File Upload Limits ???????????????????????????????????????????????????????
# Increase defaults so large PDFs don't get rejected
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ?? Logging ??????????????????????????????????????????????????????????????????
# Set to DEBUG to see chunk counts and word counts in logs
logging.level.org.example=DEBUG
logging.level.org.springframework.web=INFO

# ?? Placeholders for Day 2 (leave blank for now) ?????????????????????????????
openai.api.key=YOUR_OPENAI_API_KEY_HERE
openai.embedding.model=text-embedding-ada-002
openai.chat.model=gpt-4o-mini

# ?? Elasticsearch (Day 2 ? app will crash if ES not running) ??????????????????
# spring.elasticsearch.uris=http://localhost:9200
# spring.elasticsearch.username=elastic
# spring.elasticsearch.password=YOUR_ES_PASSWORD
# ?? Conversation history ??????????????????????????????????????????????????????
# Number of past Q&A turns retained per session (each turn = 1 user + 1 assistant message)
conversation.max-turns=10

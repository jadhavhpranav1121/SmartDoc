# Server
server.port=8080

# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.org.example=DEBUG
logging.level.org.springframework.web=INFO

# OpenAI - base key (referenced by Spring AI properties below)
openai.api.key=YOUR_OPENAI_API_KEY_HERE

# Spring AI - OpenAI integration
spring.ai.openai.api-key=${openai.api.key}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.max-tokens=1000
spring.ai.openai.embedding.options.model=text-embedding-ada-002

# Elasticsearch (must be set before starting the app)
spring.elasticsearch.uris=http://localhost:9200
# spring.elasticsearch.username=elastic
# spring.elasticsearch.password=YOUR_ES_PASSWORD

# Conversation history
# Number of past Q&A turns retained per session (each turn = 1 user + 1 assistant message)
conversation.max-turns=10

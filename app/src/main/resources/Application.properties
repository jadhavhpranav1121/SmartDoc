# Server
server.port=8080

# File Upload Limits
# Increase defaults so large PDFs don't get rejected
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
# Set to DEBUG to see chunk counts and word counts in logs
logging.level.org.example=DEBUG
logging.level.org.springframework.web=INFO

# OpenAI
openai.api.key=${OPENAI_API_KEY:YOUR_OPENAI_API_KEY_HERE}
openai.embedding.model=text-embedding-ada-002
openai.embedding.url=https://api.openai.com/v1/embeddings
openai.chat.model=gpt-4o-mini
openai.chat.url=https://api.openai.com/v1/chat/completions

